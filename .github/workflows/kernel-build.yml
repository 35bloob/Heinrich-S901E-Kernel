name: Kernel Build S901E NetHunter
on:
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
    steps:
      - name: Install deps
        run: |
          export PATH=$GITHUB_WORKSPACE/tc/clang/clang-r450784d/bin:$PATH
                    sudo apt-get update -qq
          sudo apt-get install -y bc bison build-essential ca-certificates cpio curl flex git libelf-dev libssl-dev python3 rsync unzip wget zip device-tree-compiler libncurses-dev liblz4-tool lz4 patch
      - name: Clone kernel source
        run: |
          git clone --depth=1 --single-branch -b master https://github.com/hasanbulat/s22-s901e-kernel kernel
          echo "KD=$GITHUB_WORKSPACE/kernel/android_kernel_samsung_sm8450" >> "$GITHUB_ENV"
      - name: Install Clang
        run: |
          wget -qO- https://apt.llvm.org/llvm-snapshot.gpg.key | sudo tee /etc/apt/trusted.gpg.d/apt.llvm.org.asc
          echo "deb http://apt.llvm.org/jammy/ llvm-toolchain-jammy-14 main" | sudo tee /etc/apt/sources.list.d/llvm14.list
          sudo apt-get update -qq
          sudo apt-get install -y clang-14 llvm-14 lld-14
          sudo update-alternatives --install /usr/bin/clang clang /usr/bin/clang-14 100
          sudo update-alternatives --install /usr/bin/ld.lld ld.lld /usr/bin/lld-14 100
          for t in llvm-ar llvm-nm llvm-objcopy llvm-objdump llvm-strip; do
            sudo update-alternatives --install /usr/bin/$t $t /usr/bin/${t}-14 100
          done
          echo "CP=/usr/bin" >> "$GITHUB_ENV"
      - name: Clone GCC
        run: |
          git clone --depth=1 --single-branch -b master https://android.googlesource.com/platform/prebuilts/gcc/linux-x86/aarch64/aarch64-linux-android-4.9 $HOME/tc/gcc64
          git clone --depth=1 --single-branch -b master https://android.googlesource.com/platform/prebuilts/gcc/linux-x86/arm/arm-linux-androideabi-4.9 $HOME/tc/gcc32
          echo "G64=$HOME/tc/gcc64/bin" >> "$GITHUB_ENV"
          echo "G32=$HOME/tc/gcc32/bin" >> "$GITHUB_ENV"
            - name: Verify Clang Path
        run: | 
          ls -R $GITHUB_WORKSPACE/tc/clang/ | grep bin || true
          which clang || true
          clang --version || true
      - name: Verify kernel dir
        run: |
          ls "$KD/Makefile" && echo OK || { find "$GITHUB_WORKSPACE/kernel" -maxdepth 6 -name Makefile | head -20; exit 1; }
      - name: Find defconfig
        run: |
          echo "=== Available defconfigs ==="
          find "$KD" -name "*defconfig*" | grep -v ".git" | sort | head -30
          echo "=== KD contents ==="
          ls "$KD/arch/arm64/configs/" 2>/dev/null | grep -i "r0q\|s901\|vendor" | head -20 || echo none

      - name: Build kernel
        shell: bash
        run: |
          set -o pipefail
          export PATH="$CP:$G64:$G32:$PATH"
          cd "$KD"
          F=(ARCH=arm64 CC=clang LD=ld.lld AR=llvm-ar NM=llvm-nm OBJCOPY=llvm-objcopy OBJDUMP=llvm-objdump STRIP=llvm-strip LLVM=1 LLVM_IAS=1 CLANG_TRIPLE=aarch64-linux-gnu- CROSS_COMPILE=aarch64-linux-android- CROSS_COMPILE_ARM32=arm-linux-androideabi- O=out)
          DEFCFG=$(find "$KD/arch/arm64/configs" -maxdepth 1 -name "*r0q*" -o -name "*s901*" -o -name "*r0q*" 2>/dev/null | head -1)
          [ -z "$DEFCFG" ] && DEFCFG="gki_defconfig"
          DEFCFG=$(basename "$DEFCFG")
          echo "Using defconfig: $DEFCFG"
          make "${F[@]}" "$DEFCFG" 2>&1 | tee /tmp/defconfig.log
          [ ${PIPESTATUS[0]} -eq 0 ] || { tail -50 /tmp/defconfig.log; exit 1; }
          { echo CONFIG_KSU=y; echo CONFIG_USB_GADGET=y; echo CONFIG_USB_CONFIGFS=y; echo CONFIG_USB_CONFIGFS_F_HID=y; echo CONFIG_USB_NET_DRIVERS=y; echo CONFIG_USB_USBNET=y; echo CONFIG_TUN=y; echo CONFIG_NETFILTER=y; echo CONFIG_IP_NF_IPTABLES=y; echo CONFIG_IP_NF_NAT=y; echo CONFIG_PACKET=y; } >> out/.config
          make "${F[@]}" olddefconfig 2>&1 | tee /tmp/olddefconfig.log
          make "${F[@]}" -j$(nproc --all) Image 2>&1 | tee /tmp/build.log
          [ ${PIPESTATUS[0]} -eq 0 ] || { tail -150 /tmp/build.log; exit 1; }
          echo "IMG=$KD/out/arch/arm64/boot/Image" >> "$GITHUB_ENV"
      - name: Package AnyKernel3
        run: |
          git clone --depth=1 --single-branch -b master https://github.com/osm0sis/AnyKernel3 /tmp/AK
          cp "$IMG" /tmp/AK/
          cd /tmp/AK && zip -r9 "$GITHUB_WORKSPACE/NH-S901E.zip" . -x "*.git*"
          echo "ZIP=$GITHUB_WORKSPACE/NH-S901E.zip" >> "$GITHUB_ENV"
      - name: Upload Image
        uses: actions/upload-artifact@v4
        with:
          name: NH-S901E-Image
          path: ${{ env.IMG }}
          if-no-files-found: error
      - name: Upload zip
        uses: actions/upload-artifact@v4
        with:
          name: NH-S901E-zip
          path: ${{ env.ZIP }}
          if-no-files-found: warn
      - name: Dump logs on failure
        if: failure()
        run: |
          tail -150 /tmp/build.log 2>/dev/null || true
          tail -80 /tmp/olddefconfig.log 2>/dev/null || true
          tail -50 /tmp/defconfig.log 2>/dev/null || true
