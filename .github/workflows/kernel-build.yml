name: Kernel Build S901E NetHunter

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y bc bison build-essential ca-certificates cpio curl flex git \
            jq libelf-dev libssl-dev lz4 liblz4-tool libncurses-dev python3 rsync unzip wget zip device-tree-compiler patch

      - name: Fetch Kernel and Toolchain
        run: |
          # Robust cloning from repos.json
          python3 -c '
          import json, os, subprocess
          with open("repos.json") as f:
              data = json.load(f)
              k_url = data.get("kernel", {}).get("url")
              k_br = data.get("kernel", {}).get("branch", "master")
              t_url = data.get("toolchain", {}).get("url")
              t_br = data.get("toolchain", {}).get("branch", "master")
              if k_url: subprocess.check_call(["git", "clone", "--depth=1", "-b", k_br, k_url, "kernel"])
              if t_url: subprocess.check_call(["git", "clone", "--depth=1", "-b", t_br, t_url, "tc"])
          '

      - name: Smart Detect Paths
        run: |
          # Samsung sources are often nested. Find the real Makefile.
          REAL_KD=$(find $(pwd)/kernel -name "Makefile" -not -path "*/scripts/*" -not -path "*/tools/*" -exec grep -l "VERSION =" {} + | head -n 1 | xargs dirname)
          if [ -z "$REAL_KD" ]; then echo "ERROR: Could not find Kernel Makefile"; exit 1; fi
          
          # Find the defconfig
          REAL_DC=$(find "$REAL_KD/arch/arm64/configs/" -name "*defconfig" | grep -E "s5e9925|r0s|exynos2200" | head -n 1 | xargs basename)
          
          echo "REAL_KD=$REAL_KD" >> $GITHUB_ENV
          echo "REAL_DC=$REAL_DC" >> $GITHUB_ENV
          echo "Detected Path: $REAL_KD"
          echo "Detected Config: $REAL_DC"
          
          # Handle toolchain path
          TCPATH=$(find $(pwd)/tc -name "clang" -type f -executable | head -n 1 | xargs dirname)
          echo "$TCPATH" >> $GITHUB_PATH

      - name: NetHunter Injections
        run: |
          cd "$REAL_KD"
          {
            echo "CONFIG_NETHUNTER=y"
            echo "CONFIG_USB_HID=y"
            echo "CONFIG_USB_CONFIGFS=y"
            echo "CONFIG_USB_CONFIGFS_F_HID=y"
          } >> "arch/arm64/configs/$REAL_DC"

      - name: Build
        run: |
          cd "$REAL_KD"
          ARGS=(
            ARCH=arm64 LLVM=1 LLVM_IAS=1 CC=clang LD=ld.lld
            CROSS_COMPILE=aarch64-linux-gnu- CROSS_COMPILE_ARM32=arm-linux-gnueabi-
            HOSTCC=clang HOSTCXX=clang++ HOSTLD=ld.lld O=out
          )
          make "${ARGS[@]}" "$REAL_DC"
          make "${ARGS[@]}" -j$(nproc --all) Image

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: S901E-Kernel
          path: ${{ env.REAL_KD }}/out/arch/arm64/boot/Image
