name: Ultimate NetHunter Build
on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Install Build Tools
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y bc bison build-essential cpio curl flex git jq libelf-dev libssl-dev lz4 python3 rsync wget zip device-tree-compiler

      - name: Setup Sources
        run: |
          python3 <<'PY'
          import json, os, subprocess
          with open("repos.json") as f:
              data = json.load(f)
          # Your specific JSON is a list. This gets the first entry.
          cfg = data[0] if isinstance(data, list) else data
          
          # Get Kernel
          ks = cfg.get("kernelSource", {})
          k_url = ks.get("repo")
          k_br = ks.get("branch", "main")
          if k_url:
              print(f"Cloning Kernel from {k_url}")
              subprocess.call(["git", "clone", "--depth=1", "-b", k_br, k_url, "kernel"])
          
          # Get Clang Toolchain
          tcs = cfg.get("toolchains", [])
          for tc in tcs:
              if tc.get("name") == "clang" or "clang" in tc.get("repo", ""):
                  print(f"Cloning Clang from {tc['repo']}")
                  subprocess.call(["git", "clone", "--depth=1", "-b", tc.get("branch", "master"), tc["repo"], "tc/clang"])
          
          # Backup: If no toolchain cloned, get standard Google Clang
          if not os.path.exists("tc/clang/bin/clang"):
              print("No toolchain found in JSON, downloading backup...")
              subprocess.call(["git", "clone", "--depth=1", "https://github.com/LineageOS/android_prebuilts_clang_kernel_linux-x86_clang-r416183b", "tc/clang"])
          PY

      - name: Detect Config and Path
        run: |
          # 1. Locate the directory containing the actual Makefile
          KROOT=$(find $(pwd)/kernel -name "Makefile" -exec grep -l "VERSION =" {} + | head -n 1 | xargs dirname)
          # 2. Pick a config: Check for Samsung chips first, then Odin, then fall back to anything
          KCONFIG=$(find "$KROOT/arch/arm64/configs/" -name "*defconfig" | grep -Ei "s5e9925|r0s|odin|exynos" | head -n 1)
          if [ -z "$KCONFIG" ]; then KCONFIG=$(ls $KROOT/arch/arm64/configs/*defconfig | head -n 1); fi
          
          # 3. Save values
          echo "KROOT=$KROOT" >> $GITHUB_ENV
          echo "KNAME=$(basename $KCONFIG)" >> $GITHUB_ENV
          echo "$(find $(pwd)/tc -name "clang" -type f -executable | head -n 1 | xargs dirname)" >> $GITHUB_PATH

      - name: Inject NetHunter Support
        run: |
          cd "$KROOT"
          {
            echo "CONFIG_NETHUNTER=y"
            echo "CONFIG_USB_HID=y"
            echo "CONFIG_USB_CONFIGFS=y"
            echo "CONFIG_USB_CONFIGFS_F_HID=y"
            echo "CONFIG_USB_NET_RNDIS=y"
          } >> "arch/arm64/configs/$KNAME"

      - name: Run Build
        run: |
          cd "$KROOT"
          ARGS=(
            ARCH=arm64 LLVM=1 LLVM_IAS=1 CC=clang LD=ld.lld
            CROSS_COMPILE=aarch64-linux-gnu- CROSS_COMPILE_ARM32=arm-linux-gnueabi-
            HOSTCC=clang HOSTCXX=clang++ HOSTLD=ld.lld O=out
          )
          make "${ARGS[@]}" "$KNAME"
          make "${ARGS[@]}" -j$(nproc --all) Image Image.gz || echo "Partial build failure, checking for output..."

      - name: Upload Everything
        uses: actions/upload-artifact@v4
        with:
          name: Kernel-Files
          path: |
            ${{ env.KROOT }}/out/arch/arm64/boot/Image*
            ${{ env.KROOT }}/out/arch/arm64/boot/dtbo.img
