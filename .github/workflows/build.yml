name: Build S901E NetHunter Kernel
on:
  workflow_dispatch:
  push:
    branches: [main]
jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 1
      - name: Deps
        run: sudo apt-get update -qq && sudo apt-get install -y bc bison build-essential ca-certificates cpio curl flex git libelf-dev libssl-dev python3 rsync unzip wget zip device-tree-compiler libncurses-dev liblz4-tool lz4 patch
      - name: Clang
        run: |
          mkdir -p $HOME/tc/clang
          wget -q https://android.googlesource.com/platform/prebuilts/clang/host/linux-x86/+archive/refs/heads/master/clang-r416183b.tar.gz -O /tmp/cl.tar.gz
          tar -xf /tmp/cl.tar.gz -C $HOME/tc/clang
          echo "CP=$HOME/tc/clang/bin" >> $GITHUB_ENV
      - name: GCC
        run: |
          git clone --depth=1 https://android.googlesource.com/platform/prebuilts/gcc/linux-x86/aarch64/aarch64-linux-android-4.9 $HOME/tc/gcc64
          git clone --depth=1 https://android.googlesource.com/platform/prebuilts/gcc/linux-x86/arm/arm-linux-androideabi-4.9 $HOME/tc/gcc32
          echo "G64=$HOME/tc/gcc64/bin" >> $GITHUB_ENV
          echo "G32=$HOME/tc/gcc32/bin" >> $GITHUB_ENV
      - name: Find Makefile
        run: |
          if [ -f "$GITHUB_WORKSPACE/kernel_platform/common/Makefile" ]; then
            echo "KD=$GITHUB_WORKSPACE/kernel_platform/common" >> $GITHUB_ENV
          elif [ -f "$GITHUB_WORKSPACE/Makefile" ]; then
            echo "KD=$GITHUB_WORKSPACE" >> $GITHUB_ENV
          else
            find $GITHUB_WORKSPACE -name Makefile -maxdepth 5; exit 1
          fi
      - name: Build
        run: |
          export PATH="$CP:$G64:$G32:$PATH"
          cd "$KD"
          F=(ARCH=arm64 CC=clang CLANG_TRIPLE=aarch64-linux-gnu- CROSS_COMPILE=aarch64-linux-android- CROSS_COMPILE_ARM32=arm-linux-androideabi- O=out)
          make "${F[@]}" r0q_defconfig 2>&1|tee /tmp/dc.log; [ ${PIPESTATUS[0]} -eq 0 ]||{ tail -30 /tmp/dc.log;exit 1; }
          printf "CONFIG_KSU=y
CONFIG_CFG80211=y
CONFIG_MAC80211=y
CONFIG_BT=y
CONFIG_BT_BREDR=y
CONFIG_BT_LE=y
CONFIG_BT_RFCOMM=y
CONFIG_BT_RFCOMM_TTY=y
CONFIG_BT_BNEP=y
CONFIG_BT_HIDP=y
CONFIG_BT_HCIBTUSB=y
CONFIG_BT_HCIUART=y
CONFIG_BT_HCIVHCI=y
CONFIG_USB_GADGET=y
CONFIG_USB_CONFIGFS=y
CONFIG_USB_CONFIGFS_RNDIS=y
CONFIG_USB_CONFIGFS_F_HID=y
CONFIG_USB_NET_DRIVERS=y
CONFIG_USB_USBNET=y
CONFIG_TUN=y
CONFIG_NETFILTER=y
CONFIG_IP_NF_IPTABLES=y
CONFIG_IP_NF_NAT=y
CONFIG_PACKET=y
CONFIG_ANDROID_BINDER_IPC=y
CONFIG_SECURITY_SELINUX_BOOTPARAM=y
CONFIG_SECURITY_SELINUX_DEVELOP=y
" >> out/.config
          make "${F[@]}" olddefconfig 2>&1|tee /tmp/od.log
          make "${F[@]}" -j$(nproc --all) Image 2>&1|tee /tmp/bld.log; [ ${PIPESTATUS[0]} -eq 0 ]||{ tail -80 /tmp/bld.log;exit 1; }
          echo "IMG=$KD/out/arch/arm64/boot/Image" >> $GITHUB_ENV
      - name: AnyKernel3
        run: |
          AK=""; for d in external/AnyKernel3 AnyKernel3; do [ -d "$GITHUB_WORKSPACE/$d" ]&&AK="$GITHUB_WORKSPACE/$d"&&break; done
          [ -z "$AK" ]&&git clone --depth=1 https://github.com/osm0sis/AnyKernel3 /tmp/AK&&AK=/tmp/AK
          cp "$IMG" "$AK/"; cd "$AK"; zip -r9 "$GITHUB_WORKSPACE/NH-S901E.zip" . -x "*.git*"
          echo "ZIP=$GITHUB_WORKSPACE/NH-S901E.zip" >> $GITHUB_ENV
      - name: Upload Image
        uses: actions/upload-artifact@v4
        with:
          name: NH-S901E-Image
          path: ${{ env.IMG }}
          if-no-files-found: error
      - name: Upload zip
        uses: actions/upload-artifact@v4
        with:
          name: NH-S901E-zip
          path: ${{ env.ZIP }}
          if-no-files-found: warn
      - name: Logs on failure
        if: failure()
        run: |
          cat /tmp/dc.log 2>/dev/null||true
          tail -150 /tmp/bld.log 2>/dev/null||true
          find $GITHUB_WORKSPACE -name Makefile -maxdepth 5
