name: Kernel Build S901E NetHunter

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 1

      - name: Inspect repo
        run: |
          echo "PWD=$(pwd)"
          echo "ROOT:"
          ls -la
          echo "TOP DIRS:"
          find . -maxdepth 3 -type d | sort | sed -n '1,200p'
          echo "MAKEFILES:"
          find . -type f -name Makefile | sort || true
          echo "DEFCONFIGS:"
          find . -type f ( -name '*defconfig' -o -name '*_defconfig' ) | sort | sed -n '1,200p' || true
